<div class="container-sm py-3">

  <div class="row justify-content-center">

    <!-- COMMENT LIST -->
    <div class="col-12 col-md-8 col-lg-7 mb-3"
         *ngFor="let comment of comments$ | async; let i = index">

      <div class="card comment-card">

        <!-- HEADER -->
        <div class="d-flex align-items-center p-3">

          <!-- LEFT SIDE -->
          <div class="d-flex align-items-center gap-2">

            <div class="d-flex flex-column">
              <!-- <span class="material-icons icon-clickable">add</span>
              <span class="material-icons icon-clickable">remove</span> -->
            </div>

            <img src="assets/avatars/vader.png" width="40" />

            <div>
              <h6 class="mb-0">{{ comment.user.username }}</h6>
              <small class="text-muted">
                {{ getTimeAgo(comment.createdAt) }}
              </small>
            </div>

          </div>

          <!-- RIGHT SIDE -->
          <div class="ms-auto cornerItems">

            <ng-container *ngIf="!isEdit || i !== editIndex; else editActions">
              <span class="material-icons icon-clickable"
                    (click)="editComment(i)">
                edit
              </span>
            </ng-container>

            <ng-template #editActions>
              <div class="d-flex align-items-center">
                <span class="material-icons icon-clickable"
                      (click)="replyToComment(comment.id)">
                  reply
                </span>
                <div class="ms-1">Reply</div>
              </div>
            </ng-template>

          </div>

        </div>

        <!-- COMMENT CONTENT -->
        <div class="card-body"
             *ngIf="!isEdit || i !== editIndex">

          <p class="card-text mb-0 ms-2">
            {{ comment.content }}
          </p>

          <div class="comment-footer d-flex align-items-center gap-3 mt-3">
            <span class="material-icons icon-clickable">add</span>
            <div>5</div>
            <span class="material-icons icon-clickable">remove</span>
          </div>

        </div>

        <!-- EDIT MODE -->
        <div class="card-body"
             *ngIf="isEdit && i === editIndex">

          <textarea
            #editCommentBox
            class="form-control mb-3 col-lg-2 textarea-border comment-textarea"
            [(ngModel)]="editInputText"
            (input)="autoGrow(editCommentBox)"
            [placeholder]="comment.content">
          </textarea>

          <div class="d-flex justify-content-end gap-2">

            <button (click)="saveComment(i)"
                    class="btn"
                    style="background-color:#4430B0; color:white; font-weight: bold;">
              UPDATE
            </button>

            <button class="icon-button"
                    (click)="deleteComment(comment.id)">
              <div class="d-flex align-items-center gap-1">
                <span class="material-icons">delete</span>
                <div>Delete</div>
              </div>
            </button>

          </div>

        </div>

      </div>

      <!-- REPLY CARD -->
      <div>
        <div *ngIf="replyingCommentId === comment.id" class="ms-4 mb-2">

          <div class="card comment-card p-1" style="max-width: 100%; margin-top:10px">

        <div class="d-flex align-items-center p-3 gap-2">

          <img src="assets/avatars/vader.png"
              width="40"
              height="40"
              class="rounded-circle" />

          <div>
            <h6 class="mb-0">You</h6>
            <small class="text-muted">Replying...</small>
          </div>

      </div>

    <!-- BODY -->
    <div class="card-body pt-0">

      <textarea
        #replyBox
        class="form-control textarea-border comment-textarea mb-3"
        [(ngModel)]="commentText"
        placeholder="Write a reply..."
      ></textarea>

      <div class="text-end">
        <div class="btn"
             style="background:#4430B0;color:white;font-weight:bold;"
             (click)="addReply(comment.id)">
          Reply
        </div>
      </div>

        </div>

      </div>

        </div>
      </div>
      <!-- REPLY CARD END -->

    </div>

  </div>

  <!-- NEW COMMENT BOX -->
  <div class="row justify-content-center mt-4">

    <div class="col-12 col-md-8 col-lg-7 mx-auto">

      <div class="card p-3 comment-input-card">

        <div class="d-flex align-items-start gap-3 comment-input-wrapper">

          <!-- Avatar -->
          <div>
            <img src="assets/avatars/vader.png"
                 width="40"
                 height="40"
                 class="rounded-circle comment-avatar" />
          </div>

          <!-- Textarea -->
          <div class="flex-grow-1">
            <textarea
              #commentBox
              class="form-control textarea-border comment-textarea"
              [(ngModel)]="commentText"
              (input)="autoGrow(commentBox)"
              [placeholder]="isReplyMode ? 'Replying...' : 'Add a comment...'">
            </textarea>
          </div>

          <!-- Send Button -->
          <div>
            <button class="btn comment-send-btn"
                    (click)="addComment()"
                    style="background-color:#4430B0; color:white; font-weight: bold;">
              Send
            </button>
          </div>

        </div>

      </div>

    </div>

  </div>

</div>
