<div class="w-100 p-4">

  <h2 class="mb-3">Delete Comment</h2>

  <p class="mb-4" style="line-height: 1.6;">
    Are you sure you want to delete this comment?
    This action cannot be undone.
  </p>

  <div class="text-end">
    <button class="btn btn-danger btn-sm me-2" (click)="confirm()">
      YES, DELETE
    </button>

    <button class="btn btn-secondary btn-sm" (click)="cancel()">
      NO, CANCEL
    </button>
  </div>

</div>
